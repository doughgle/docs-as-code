name: Publish to MCP Registry

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Build package
      run: python -m build

    - name: Create server.json for MCP Registry
      run: |
        cat > server.json << 'EOF'
        {
          "name": "mcp-server-template",
          "version": "${{ github.event.release.tag_name }}",
          "description": "A template repository for creating MCP servers with Python",
          "homepage": "${{ github.event.repository.html_url }}",
          "repository": {
            "type": "git",
            "url": "${{ github.event.repository.clone_url }}"
          },
          "author": {
            "name": "${{ github.event.repository.owner.login }}"
          },
          "license": "Apache-2.0",
          "keywords": ["mcp", "model-context-protocol", "template", "python"],
          "runtime": {
            "type": "python",
            "command": "uvx",
            "args": ["mcp-server-template"]
          },
          "capabilities": {
            "tools": true,
            "prompts": true,
            "resources": true
          }
        }
        EOF

    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
      run: |
        twine upload dist/*
      if: env.TWINE_PASSWORD != ''

    - name: Upload server.json as release asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./server.json
        asset_name: server.json
        asset_content_type: application/json
      if: github.event.release

    - name: Comment on release
      uses: actions/github-script@v7
      if: github.event.release
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `🎉 Published to MCP Registry!\n\nInstall with:\n\`\`\`bash\nuvx mcp-server-template\n\`\`\`\n\nOr add to your Claude/VSCode config:\n\`\`\`json\n{\n  "mcpServers": {\n    "mcp-server-template": {\n      "command": "uvx",\n      "args": ["mcp-server-template"]\n    }\n  }\n}\n\`\`\``
          })
